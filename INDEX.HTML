    <style>

            align-items: center;

        }

        .submit-btn {
            width: 100%;
            margin-top: 28px;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(30, 58, 95, 0.2);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

<body>

    <div class="header">
        <h1>Laporan Harian Alat Berat</h1>
    </div>

    <div class="container">
        <div class="form-card">
            <div class="accent-bar"></div>
            <div class="form-body">
                <form id="laporanForm" onsubmit="return handleSubmit(event)">

                    <label>Tanggal *</label>
                    <input type="date" id="tanggal" required>

                    <!-- VALIDASI DATALIST AKTIF PADA ONCHANGE (Terkunci ke data dropdown) -->
                    <label>Operator *</label>
                    <input list="opList" id="operator" placeholder="Ketik / Pilih Nama" required onchange="validateDatalist(this, 'opList')">
                    <datalist id="opList">
                        <option value="HUDIONO">
                        <option value="MOCHAMAD WAHYUDI">
                        <option value="SHOLIHUL HAMIM">
                        <option value="HERU PRASETYO">
                        <option value="NUR SAFI'I">
                        <option value="RUDIYANTO">
                        <option value="FATKUR ROHMAN">
                        <option value="ANDRIK AGUS SUBANDRIO">
                        <option value="MUHAMMAD YUSUF">
                        <option value="DEVI LINA NOVITA">
                        <option value="AHMAD SAMZUL DHUKA">
                        <option value="PARDIONO">
                        <option value="MAHMUDI">
                        <option value="SUPRIYADI">
                        <option value="DIKY ANDIKA PUTRA">
                        <option value="MUHAMMAD ABDUL MAJID">
                        <option value="KHOIRUL FAWAID">
                        <option value="MOHAMAD SYAIFUDIN">
                        <option value="YUNANDA SEKTI TUNGGAL ADITYA">
                        <option value="IWAN NASRUDIN">
                        <option value="M. ARDI SUSANTO">
                        <option value="ARIS ROHMADI">
                        <option value="DWI PRIYO YULIANTO">
                        <option value="SUMINTO">
                        <option value="BADUK ARIFIN">
                    </datalist>

                    <label>Helper (Opsional)</label>
                    <input type="text" id="helper" placeholder="Nama Helper">

                    <div class="row">
                        <div class="col">
                            <label>Kecamatan *</label>
                            <select id="kecamatan" required onchange="loadDesa()">
                                <option value="">Pilih...</option>
                                <option value="BALEN">BALEN</option>
                                <option value="BAURENO">BAURENO</option>
                                <option value="BOJONEGORO">BOJONEGORO</option>
                                <option value="BUBULAN">BUBULAN</option>
                                <option value="DANDER">DANDER</option>
                                <option value="GAYAM">GAYAM</option>
                                <option value="GONDANG">GONDANG</option>
                                <option value="KALITIDU">KALITIDU</option>
                                <option value="KANOR">KANOR</option>
                                <option value="KAPAS">KAPAS</option>
                                <option value="KASIMAN">KASIMAN</option>
                                <option value="KEDEWAN">KEDEWAN</option>
                                <option value="KEDUNGADEM">KEDUNGADEM</option>
                                <option value="KEPOHBARU">KEPOHBARU</option>
                                <option value="MALO">MALO</option>
                                <option value="MARGOMULYO">MARGOMULYO</option>
                                <option value="NGAMBON">NGAMBON</option>
                                <option value="NGASEM">NGASEM</option>
                                <option value="NGRAHO">NGRAHO</option>
                                <option value="PADANGAN">PADANGAN</option>
                                <option value="PURWOSARI">PURWOSARI</option>
                                <option value="SEKAR">SEKAR</option>
                                <option value="SUGIHWARAS">SUGIHWARAS</option>
                                <option value="SUKOSEWU">SUKOSEWU</option>
                                <option value="SUMBERREJO">SUMBERREJO</option>
                                <option value="TAMBAKREJO">TAMBAKREJO</option>
                                <option value="TEMAYANG">TEMAYANG</option>
                                <option value="TRUCUK">TRUCUK</option>
                            </select>
                        </div>
                        <div class="col">
                            <label>Desa *</label>
                            <select id="desa" required>
                                <option value="">Pilih...</option>
                            </select>
                        </div>
                    </div>

                    <!-- VALIDASI DATALIST AKTIF PADA ONCHANGE (Terkunci ke data dropdown) -->
                    <label>Jenis Alat *</label>
                    <input list="alatList" id="jenisAlat" required placeholder="Pilih Jenis Alat" onchange="validateDatalist(this, 'alatList')">
                    <datalist id="alatList">
                        <option value="Excavator 5 Ton (PC 50)">
                        <option value="Excavator 7,5 Ton (PC 75)">
                        <option value="Excavator 13 Ton (313D / PC 100)">
                        <option value="Excavator 20 Ton Standard (PC 200)">
                        <option value="Excavator 20 Ton Long Arm">
                        <option value="Bulldozer">
                        <option value="Wheel Excavator">
                    </datalist>

                    <label>Progress Pekerjaan *</label>
                    <input type="text" id="progress" placeholder="Contoh: Galian saluran 50%" required>

                    <label>Keterangan</label>
                    <textarea id="keterangan" rows="3" placeholder="Keterangan tambahan..."></textarea>

                    <div class="row">
                        <div class="col">
                            <label>HM Awal</label>
                            <input type="number" step="0.01" id="hmAwal" placeholder="0" oninput="calcJam()">
                        </div>
                        <div class="col">
                            <label>HM Akhir</label>
                            <input type="number" step="0.01" id="hmAkhir" placeholder="0" required oninput="calcJam()">
                        </div>
                        <div class="col">
                            <label>Jam Kerja</label>
                            <div class="jam-display" id="jamKerjaDisplay">-</div>
                        </div>
                    </div>

                    <label>Panjang Pekerjaan</label>
                    <input type="text" id="panjangPekerjaan" placeholder="Contoh: 15 meter">

                    <label>Upload Foto (HANYA FOTO)</label>
                    <div class="hint">
                        📸 <strong>Petunjuk:</strong><br>
                        • Jangan upload Video.<br>
                        • Foto akan otomatis dikompres agar tidak error.<br>
                        • Mohon Upload foto progres & HM layar monitor.
                    </div>
                    <input type="file" id="photo" multiple accept="image/*" onchange="handlePhotos()">
                    <div class="photo-grid" id="photoGrid"></div>

                    <button type="submit" class="submit-btn" id="submitBtn">Kirim Laporan</button>

                </form>
            </div>
        </div>
    </div>

    <script>
        let wilayah = {}, photoUrls = [], photoPreviews = [], isSubmitting = false;

        document.addEventListener("DOMContentLoaded", function () {
            if (typeof google === 'undefined') {
                wilayah = {
                    "NGRAHO": ["Luwihaji", "Sugihwaras", "Nganti", "Jumok", "Sumberagung", "Mojorejo", "Ngraho"],
                    "TAMBAKREJO": ["Napis", "Jatimulyo", "Ngrancang", "Turi", "Malingmati", "Tambakrejo"]
                };
                isWilayahLoaded = true;
                if (document.getElementById("kecamatan").value) loadDesa();
            } else {
                google.script.run
                    .withSuccessHandler(function (data) {
                        wilayah = data || {};
                        isWilayahLoaded = true;
                        if (document.getElementById("kecamatan").value !== "") loadDesa();
                    })
                    .withFailureHandler(function (err) {
                        isWilayahLoaded = true;
                        Swal.fire('Koneksi Error', 'Gagal memuat data desa dari server.', 'error');
                    })
                    .getWilayah();
            }
        });

        // === FUNGSI AGAR LIST TIDAK BISA DITULIS NGAWUR ===
        function validateDatalist(inputElement, listId) {
            if (!inputElement || !listId) return;
            const dataList = document.getElementById(listId);
            if (!dataList) return;
            const validOptions = Array.from(dataList.options).map(function(opt) { return opt.value; });

            if (inputElement.value && validOptions.indexOf(inputElement.value) === -1) {
                inputElement.value = '';
                Swal.fire('Data Tidak Dikenali', 'Anda harus memilih dari daftar yang sudah disediakan. Tidak boleh diketik di luar data dropdown.', 'warning');
            }
        }

        function loadDesa() {
            const sel = document.getElementById("kecamatan");
            if (!sel) return;
            const kec = sel.value.trim().toUpperCase();
            const desaSel = document.getElementById("desa");
            if (!desaSel) return;
            desaSel.innerHTML = '<option value="">Pilih...</option>';

            if (!isWilayahLoaded && typeof google !== 'undefined') {
                desaSel.innerHTML = '<option value="">⏳ Sedang memuat data...</option>';
                setTimeout(loadDesa, 500);
                return;
            }

            const matchKey = Object.keys(wilayah).find(function(k) { return String(k).trim().toUpperCase() === kec; });
            if (matchKey && wilayah[matchKey]) {
                wilayah[matchKey].sort().forEach(function(d) { desaSel.innerHTML += '<option value="' + d + '">' + d + '</option>'; });
            }
        }

        function calcJam() {
            const a = parseFloat(document.getElementById("hmAwal").value.replace(",", ".") || 0);
            const b = parseFloat(document.getElementById("hmAkhir").value.replace(",", ".") || 0);
            document.getElementById("jamKerjaDisplay").textContent = (b > a) ? (b - a).toFixed(1) + " jam" : "-";
        }

        /* 
         * LOGIKA UPLOAD FOTO (SEQUENTIAL BATCH & UI YIELDING) 
         * Memastikan tidak terjadi TIME-OUT ketika file banyak
         */
        async function handlePhotos() {
            const fileInput = document.getElementById("photo");
            const files = Array.from(fileInput.files);

            const validFiles = files.filter(f => f.type.startsWith('image/'));
            if (files.length !== validFiles.length) {
                Swal.fire('Format Salah', 'Hanya file FOTO yang diperbolehkan.', 'warning');
                fileInput.value = ""; return;
            }
            if (validFiles.length === 0) return;

            const btn = document.getElementById("submitBtn");
            const originalText = btn.innerText;

            btn.disabled = true;
            let batchImages = [];

            // Proses secara Seri (satu per satu) dengan Jeda UI
            for (let i = 0; i < validFiles.length; i++) {
                const f = validFiles[i];
                btn.innerText = `⏳ Compressing ${i + 1}/${validFiles.length}...`;
                await new Promise(resolve => setTimeout(resolve, 50)); 

                try {
                    // Kompresi MAX lebar 600px dengan Quality Jpeg 0.5 (DIKECILKAN AGAR UPLOAD LEBIH CEPAT KILAT)
                    const base64 = await compressImage(f, 0.5, 600);
                    batchImages.push({ base64: base64, name: f.name });

                    photoPreviews.push(base64);
                    renderPhotos(); 
                } catch (err) {
                    console.error("Error compressing:", f.name, err);
                }
            }

            // Mulai Upload ke Server API Google (Satu Per Satu)
            if (batchImages.length > 0) {
                if (typeof google !== 'undefined') {
                    for (let x = 0; x < batchImages.length; x++) {
                        btn.innerText = `⏳ Uploading Photo ${x + 1}/${batchImages.length}...`;
                        
                        // Unggah satu gambar pada satu waktu secara Sequential (Sangat aman dari limitasi Google)
                        const singleResult = await uploadBatchToServer([batchImages[x]]);
                        
                        if (singleResult.success) {
                            photoUrls.push(...singleResult.urls);
                        } else {
                            console.error("Gagal upload:", singleResult.error);
                            Swal.fire('Gagal Upload', `Upload foto ke-${x + 1} terputus jaringan. Silahkan klik silang (X) pada foto yang gagal di bawah lalu unggah ulang.`, 'error');
                            
                            // Hapus antrian gambar yg belum terupload di view
                            const remaining = batchImages.length - x;
                            photoPreviews.splice(photoPreviews.length - remaining, remaining);
                            renderPhotos();
                            break; 
                        }
                    }
                    if (photoUrls.length > 0 && photoUrls.length === batchImages.length) {
                         Swal.fire('Upload Berhasil', `${photoUrls.length} foto siap dikirim.`, 'success');
                    }
                } else {
                    await new Promise(r => setTimeout(r, 1000));
                    batchImages.forEach(img => photoUrls.push("https://mock-url.com/" + img.name));
                }
            }

            btn.innerText = originalText;
            btn.disabled = false;
            fileInput.value = "";
        }

        function uploadBatchToServer(images) {
            return new Promise((resolve) => {
                google.script.run
                    .withSuccessHandler(res => resolve(res))
                    .withFailureHandler(err => resolve({ success: false, error: err.message }))
                    .saveTempPhotosBatch(images);
            });
        }

        function compressImage(file, quality, maxWidth) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(img.src); 
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxWidth) {
                            width = Math.round((width * maxWidth) / height);
                            height = maxWidth;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = (err) => {
                    URL.revokeObjectURL(img.src);
                    reject(err);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        function renderPhotos() {
            const grid = document.getElementById("photoGrid");
            grid.innerHTML = "";
            photoPreviews.forEach((src, i) => {
                grid.innerHTML += `<div class="photo-thumb"><img src="${src}"><button type="button" class="photo-remove" onclick="removePhoto(${i})">×</button></div>`;
            });
        }

        function removePhoto(i) {
            photoPreviews.splice(i, 1);
            photoUrls.splice(i, 1);
            renderPhotos();
        }

        function handleSubmit(e) {
            e.preventDefault();
            if (isSubmitting) return;

            if (photoUrls.length === 0 && photoPreviews.length > 0) {
                Swal.fire('Harap Tunggu!', 'Foto sedang diupload backend. Tunggu sampai notifikasi "Upload Berhasil" muncul!', 'warning');
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true; 
            btn.innerText = "⏳ Sedang Menyimpan Laporan...";
            isSubmitting = true;

            const payload = {
                tanggal: document.getElementById("tanggal").value,
                operator: document.getElementById("operator").value,
                helper: document.getElementById("helper").value,
                kecamatan: document.getElementById("kecamatan").value,
                desa: document.getElementById("desa").value,
                jenisAlat: document.getElementById("jenisAlat").value,
                progress: document.getElementById("progress").value,
                keterangan: document.getElementById("keterangan").value,
                hmAwal: document.getElementById("hmAwal").value,
                hmAkhir: document.getElementById("hmAkhir").value,
                panjangPekerjaan: document.getElementById("panjangPekerjaan").value,
                photoUrls: photoUrls
            };

            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler(res => {
                        btn.disabled = false; btn.innerText = "Kirim Laporan"; isSubmitting = false;
                        if (res.success) {
                            Swal.fire('Sukses!', 'Laporan berhasil terkirim dan disimpan di Google Sheets.', 'success');
                            document.getElementById("laporanForm").reset();
                            photoUrls = []; photoPreviews = []; renderPhotos();
                            document.getElementById("jamKerjaDisplay").innerText = "-";
                        } else {
                            Swal.fire('Gagal Menyimpan', res.message, 'error');
                        }
                    })
                    .withFailureHandler(err => {
                        btn.disabled = false; btn.innerText = "Kirim Laporan"; isSubmitting = false;
                        Swal.fire('Koneksi Error', err.message, 'error');
                    })
                    .saveData(payload);
            } else {
                setTimeout(() => {
                    btn.disabled = false; btn.innerText = "Kirim Laporan"; isSubmitting = false;
                    Swal.fire('Sukses (Simulasi)!', 'Data Laporan tersimpan di Spreadsheet simulasi.', 'success');
                    document.getElementById("laporanForm").reset();
                    photoUrls = []; photoPreviews = []; renderPhotos();
                }, 1000);
            }
        }
    </script>
</body>
